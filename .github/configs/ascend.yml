# Ascend Hardware Configuration
# This file defines CI/CD settings for Ascend NPU testing

platform: ascend

# Docker image for this hardware
ci_image: harbor.baai.ac.cn/flagscale/vllm-plugin-fl:v0.1.0-ascend-ci

# Runner labels for this hardware
runner_labels:
  - self-hosted
  - Linux
  - ARM64
  - ascend
  - npu-16

# Container volumes (hardware-specific paths)
container_volumes:
  - /usr/local/dcmi:/usr/local/dcmi
  - /usr/local/bin/npu-smi:/usr/local/bin/npu-smi
  - /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/
  - /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info
  - /usr/local/Ascend/driver:/usr/local/Ascend/driver
  - /usr/local/sbin:/usr/local/sbin
  - /etc/ascend_install.info:/etc/ascend_install.info
  - /data:/data

# Container options (hardware-specific settings)
container_options: >-
  --hostname vllm-plugin-fl
  --ipc=host
  --privileged
  --device /dev/davinci0
  --device /dev/davinci1
  --device /dev/davinci2
  --device /dev/davinci3
  --device /dev/davinci4
  --device /dev/davinci5
  --device /dev/davinci6
  --device /dev/davinci7
  --device /dev/davinci8
  --device /dev/davinci9
  --device /dev/davinci10
  --device /dev/davinci11
  --device /dev/davinci12
  --device /dev/davinci13
  --device /dev/davinci14
  --device /dev/davinci15
  --device /dev/davinci_manager
  --device /dev/devmm_svm
  --device /dev/hisi_hdc
