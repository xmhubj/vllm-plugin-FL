# Reusable E2E test workflow — slow, end-to-end model validation.
#
# Runs inference and serving tests that require real model files on disk
# and substantial GPU memory. Each invocation tests one model/case combo.
# Called by _platform_test.yml for each entry in the E2E test matrix.

name: E2E Test

on:
  workflow_call:
    inputs:
      platform:
        description: "Platform name (e.g., cuda, ascend)"
        required: true
        type: string
      task:
        description: "Test task category (e.g., inference, serving)"
        required: true
        type: string
      model:
        description: "Model name (e.g., qwen3)"
        required: false
        type: string
        default: ""
      case:
        description: "Test case variant (e.g., 4b_tp2, 0.5b)"
        required: false
        type: string
        default: ""
      device:
        description: "Device type (e.g., a100, 910b)"
        required: false
        type: string
        default: ""
      ci_image:
        description: "Docker image for the test container"
        required: true
        type: string
      runner_labels:
        description: "JSON array of runner labels"
        required: true
        type: string
      container_volumes:
        description: "JSON array of volume mounts"
        required: false
        type: string
        default: "[]"
      container_options:
        description: "Docker container options string"
        required: false
        type: string
        default: ""
      timeout:
        description: "Timeout for the job in minutes"
        required: false
        type: number
        default: 60

jobs:
  e2e-test:
    name: "${{ inputs.task }}/${{ inputs.model }}/${{ inputs.case }} (${{ inputs.platform }})"
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    timeout-minutes: ${{ inputs.timeout }}
    container:
      image: ${{ inputs.ci_image }}
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - uses: actions/checkout@v4

      - name: Check device availability
        run: bash .github/scripts/${{ inputs.platform }}/check.sh

      - name: Install project
        run: |
          uv pip install --system --upgrade pip
          uv pip install --system --no-build-isolation  -e ".[test]"

      - name: Run E2E test
        run: |
          python tests/run.py \
            --platform ${{ inputs.platform }} \
            --device "${{ inputs.device }}" \
            --scope e2e \
            --task ${{ inputs.task }} \
            --model "${{ inputs.model }}" \
            --case "${{ inputs.case }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ inputs.platform }}-${{ inputs.task }}-${{ inputs.model }}-${{ inputs.case }}
          path: |
            test-results-${{ inputs.platform }}.xml
            test-results-${{ inputs.platform }}.json
