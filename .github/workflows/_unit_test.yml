# Reusable unit test workflow — platform-agnostic.
#
# Accepts platform config (image, labels, volumes, options) as inputs
# so it can run on any backend (CUDA, Ascend, etc.).
# Platform-specific dependencies are installed via .github/scripts/<platform>/setup.sh.

name: Unit Tests

on:
  workflow_call:
    inputs:
      platform:
        description: "Platform name (e.g., cuda, ascend)"
        required: true
        type: string
      ci_image:
        description: "Docker image for the test container"
        required: true
        type: string
      runner_labels:
        description: "JSON array of runner labels"
        required: true
        type: string
      container_volumes:
        description: "JSON array of volume mounts"
        required: false
        type: string
        default: "[]"
      container_options:
        description: "Docker container options string"
        required: false
        type: string
        default: ""
      upload_coverage:
        description: "Whether to upload coverage report"
        required: false
        type: boolean
        default: true

jobs:
  unit-tests:
    name: Unit Tests (${{ inputs.platform }})
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    container:
      image: ${{ inputs.ci_image }}
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        id: checkout2
        if: steps.checkout1.outcome == 'failure'
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout2.outcome == 'failure'
        uses: actions/checkout@v4

      - name: Check device availability
        run: bash .github/scripts/${{ inputs.platform }}/check.sh

      - name: Install project
        run: bash .github/scripts/${{ inputs.platform }}/setup.sh

      - name: Run unit tests
        run: |
          python tests/run.py \
            --platform ${{ inputs.platform }} \
            --scope unit

      - name: Upload coverage report
        if: inputs.upload_coverage && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.platform }}
          path: |
            coverage-${{ inputs.platform }}.json
            report-${{ inputs.platform }}.json

      - name: Upload coverage report to FlagCICD
        if: inputs.upload_coverage && always()
        uses: flagos-ai/FlagOps/actions/post-pytest-report@v2
        continue-on-error: true
        with:
          backend_url: 'http://flagcicd-inner.flagos.net:8000/metrics/'
          user_id: '000000000000000000'
          report_path: 'coverage-${{ inputs.platform }}.json'
          fail_on_error: 'false'
